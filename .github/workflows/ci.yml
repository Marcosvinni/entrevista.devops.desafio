name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  api-checks:
    name: API - Build & Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: apps/api
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate Python syntax
        working-directory: apps/api
        run: |
          python -m py_compile main.py

      - name: Build API Docker image
        run: |
          docker build -t devops-api:ci -f Dockerfile .

  frontend-build:
    name: Frontend - Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Frontend Docker image
        run: |
          docker build -t devops-frontend:ci ./apps/frontend

  trivy-scan:
    name: Security - Trivy Scan
    runs-on: ubuntu-latest
    needs: [api-checks, frontend-build]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t devops-api:ci -f Dockerfile .

      - name: Build Frontend image
        run: docker build -t devops-frontend:ci ./apps/frontend

      - name: Scan API image
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: devops-api:ci
          format: table
          exit-code: 1
          ignore-unfixed: true
          severity: CRITICAL,HIGH

      - name: Scan Frontend image
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: devops-frontend:ci
          format: table
          exit-code: 1
          ignore-unfixed: true
          severity: CRITICAL,HIGH

  terraform-validate:
    name: Terraform - Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt
        working-directory: terraform
        run: terraform fmt -check -recursive

      - name: Terraform init
        working-directory: terraform
        run: terraform init -backend=false

      - name: Terraform validate
        working-directory: terraform
        run: terraform validate